name: setup-rust
description: Set up Rust from the committed rust-toolchain.toml, with cargo cache. Call this inline from a job's steps.

inputs:
  cache-key:
    description: "Cache key suffix passed to Swatinem/rust-cache (e.g. 'ci-ubuntu-latest', 'release-x86_64-unknown-linux-musl')."
    required: false
    default: "ci"
  targets:
    description: "Space-separated extra Rust targets to install (e.g. 'x86_64-unknown-linux-musl'). Empty installs only what rust-toolchain.toml declares."
    required: false
    default: ""
  add-components:
    description: "Whether to request the clippy and rustfmt components. rust-toolchain.toml already declares them; this is kept for explicitness and for callers that override the toolchain."
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      with:
        targets: ${{ inputs.targets }}
        components: ${{ inputs.add-components == 'true' && 'clippy, rustfmt' || '' }}
    - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      with:
        key: ${{ inputs.cache-key }}
