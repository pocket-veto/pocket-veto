name: setup-android
description: Set up JDK 24, Android SDK 37, and Gradle 9.6.0 for the Android build. Call this inline from a job's steps; the caller then runs `gradle --no-daemon <task>` itself.

runs:
  using: composite
  steps:
    - name: Set up JDK 24
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
      with:
        distribution: temurin
        java-version: "24"
    - name: Set up Android SDK
      uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699
      with:
        packages: |
          platforms;android-37.0.0
          build-tools;37.0.0
    - name: Set up Gradle 9.6.0
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92
      with:
        gradle-version: 9.6.0
